name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
          pip install pytest
      - name: Check commit message
        id: check
        run: |
          MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $MSG"

          if echo "$MSG" | grep -q "autofix"; then
            echo "mode=fix" >> $GITHUB_OUTPUT
          else
            echo "mode=check" >> $GITHUB_OUTPUT
          fi
      - name: Run lint (normal)
        if: steps.check.outputs.mode == 'check'
        run: ruff check .

      - name: Run lint (auto-fix)
        if: steps.check.outputs.mode == 'fix'
        run: ruff check . --fix

      - name: Run unit tests
        run: pytest test_calculator.py -v
